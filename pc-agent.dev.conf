# Local development example.
# Run with:
#   java -Dpc.agent.config=pc-agent.dev.conf -jar target/home-center-pc-agent-1.0.jar

server.url=http://127.0.0.1:8866

agent.name=local-dev-agent
agent.reconnect.seconds=5

check.interval.hours=24
cmd.enabled=true
cmd.default-timeout-seconds=60
cmd.max-output-bytes=1048576
